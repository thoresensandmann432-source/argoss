<title>ARGOS · Free APIs Catalogue</title>

<style>
:root{
  --void-black:#050508;--void-dark:#0A0A0F;--void-mid:#12121A;--void-card:#0F0F18;
  --neon-cyan:#00D4FF;--neon-blue:#4D9FFF;--soft-blue:#9DC4FF;
  --neon-green:#00FF9D;--neon-red:#FF3C5A;--neon-yellow:#FFD700;--neon-purple:#BF6AFF;
  --border:rgba(0,212,255,.15);--text-dim:rgba(157,196,255,.55);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--void-black);color:#fff;font-family:'Inter',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.05) 2px,rgba(0,0,0,.05) 4px)}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);background-size:60px 60px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--void-dark)}
::-webkit-scrollbar-thumb{background:var(--neon-cyan);border-radius:2px}

.wrap{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:24px}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;justify-content:space-between;padding-bottom:20px;border-bottom:1px solid var(--border);margin-bottom:24px}
.hdr-logo{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:20px;letter-spacing:.15em;color:var(--neon-cyan);text-shadow:0 0 20px rgba(0,212,255,.6)}
.hdr-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:.2em;margin-top:2px}
.hdr-stat{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--soft-blue)}
.hdr-stat span{color:var(--neon-cyan)}

/* ── SEARCH + FILTERS ── */
.controls{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.search-wrap{flex:1;min-width:220px;position:relative}
.search-wrap input{
  width:100%;background:var(--void-card);border:1px solid var(--border);border-radius:6px;
  padding:10px 14px 10px 36px;color:#fff;font-family:'JetBrains Mono',monospace;font-size:12px;
  outline:none;transition:border-color .2s
}
.search-wrap input:focus{border-color:rgba(0,212,255,.4)}
.search-wrap input::placeholder{color:var(--text-dim)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:13px}
.filters{display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{
  padding:7px 14px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:10px;
  letter-spacing:.1em;border:1px solid var(--border);background:transparent;color:var(--text-dim);
  cursor:pointer;transition:all .2s;white-space:nowrap
}
.filter-btn:hover{border-color:rgba(0,212,255,.3);color:var(--soft-blue)}
.filter-btn.active{border-color:var(--neon-cyan);color:var(--neon-cyan);background:rgba(0,212,255,.08)}
.filter-btn.argos-only{border-color:rgba(0,255,157,.3);color:var(--neon-green)}
.filter-btn.argos-only.active{background:rgba(0,255,157,.1)}

/* ── LEGEND ── */
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:.08em}
.leg{display:flex;align-items:center;gap:5px}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}

/* ── API CARD ── */
.api-card{
  background:var(--void-card);border:1px solid var(--border);border-radius:8px;
  padding:16px;display:flex;flex-direction:column;gap:10px;
  position:relative;overflow:hidden;transition:border-color .25s,transform .2s;cursor:default
}
.api-card:hover{border-color:rgba(0,212,255,.35);transform:translateY(-1px)}
.api-card::before{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(0,212,255,.025) 0%,transparent 60%);pointer-events:none}
.api-card.argos-hot{border-color:rgba(0,255,157,.2)}
.api-card.argos-hot::after{
  content:'';position:absolute;top:0;right:0;width:3px;height:100%;
  background:linear-gradient(180deg,var(--neon-green),transparent)
}

/* card top */
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-name{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;color:#fff;letter-spacing:.04em}
.card-tags{display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0}
.tag{padding:2px 7px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;font-weight:600}
.tag.free{background:rgba(0,255,157,.12);color:var(--neon-green);border:1px solid rgba(0,255,157,.2)}
.tag.key{background:rgba(0,212,255,.1);color:var(--neon-cyan);border:1px solid rgba(0,212,255,.2)}
.tag.nokey{background:rgba(77,159,255,.1);color:var(--neon-blue);border:1px solid rgba(77,159,255,.2)}
.tag.argos{background:rgba(0,255,157,.15);color:var(--neon-green);border:1px solid rgba(0,255,157,.3)}
.tag.hot{background:rgba(255,215,0,.12);color:var(--neon-yellow);border:1px solid rgba(255,215,0,.25)}
.tag.paid{background:rgba(255,60,90,.1);color:var(--neon-red);border:1px solid rgba(255,60,90,.2)}

/* desc */
.card-desc{font-size:12px;color:rgba(255,255,255,.65);line-height:1.55}
.card-meta{display:flex;align-items:center;justify-content:space-between;gap:8px}
.cat-badge{
  font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.12em;
  padding:3px 8px;border-radius:3px;border:1px solid var(--border);color:var(--text-dim)
}
.card-url{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--neon-blue);
  text-decoration:none;letter-spacing:.03em;transition:color .2s}
.card-url:hover{color:var(--neon-cyan);text-decoration:underline}
.card-note{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--neon-yellow);
  background:rgba(255,215,0,.07);border:1px solid rgba(255,215,0,.15);
  border-radius:3px;padding:4px 8px;letter-spacing:.05em}
.no-results{grid-column:1/-1;text-align:center;padding:60px 20px;
  font-family:'JetBrains Mono',monospace;color:var(--text-dim);letter-spacing:.1em}

/* ── COUNT BAR ── */
.count-bar{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);
  margin-bottom:14px;display:flex;align-items:center;gap:8px}
.count-bar span{color:var(--neon-cyan)}

@media(max-width:600px){.grid{grid-template-columns:1fr}.controls{flex-direction:column}}
</style>

// State
let currentCat='all';
let currentSearch='';

function authBadge(a){
  if(a==='nokey')return'<span class="tag nokey">NO KEY</span>';
  if(a==='key')return'<span class="tag key">API KEY</span>';
  return'<span class="tag key">OAUTH</span>';
}

function render(){
  const grid=document.getElementById('grid');
  const filtered=APIs.filter(api=>{
    const matchCat=currentCat==='all'||(currentCat==='argos'&&api.argos)||api.cat===currentCat;
    const q=currentSearch.toLowerCase();
    const matchQ=!q||api.name.toLowerCase().includes(q)||api.desc.toLowerCase().includes(q)||(api.note&&api.note.toLowerCase().includes(q))||api.cat.toLowerCase().includes(q);
    return matchCat&&matchQ;
  });

  document.getElementById('shown-count').textContent=filtered.length;
  document.getElementById('shown-count2').textContent=filtered.length;
  document.getElementById('total-count').textContent=APIs.length;
  document.getElementById('total-count2').textContent=APIs.length;

  if(!filtered.length){
    grid.innerHTML='<div class="no-results">НЕТ РЕЗУЛЬТАТОВ · попробуй другой запрос</div>';
    return;
  }

  grid.innerHTML=filtered.map(api=>`
    <div class="api-card${api.argos?' argos-hot':''}">
      <div class="card-top">
        <div class="card-name">${api.name}</div>
        <div class="card-tags">
          ${api.hot?'<span class="tag hot">HOT</span>':''}
          ${api.argos?'<span class="tag argos">ARGOS ✓</span>':''}
          ${api.free?'<span class="tag free">FREE</span>':'<span class="tag paid">PAID</span>'}
          ${authBadge(api.auth)}
        </div>
      </div>
      <div class="card-desc">${api.desc}</div>
      ${api.note?`<div class="card-note">⚡ ${api.note}</div>`:''}
      <div class="card-meta">
        <span class="cat-badge">${api.cat}</span>
        <a href="${api.url}" class="card-url" target="_blank">${api.url.replace('https://','').replace('http://','').split('/')[0]}</a>
      </div>
    </div>
  `).join('');
}

// Event listeners
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentCat=btn.dataset.cat;
    render();
  });
});

document.getElementById('search').addEventListener('input',e=>{
  currentSearch=e.target.value;
  render();
});

render();
