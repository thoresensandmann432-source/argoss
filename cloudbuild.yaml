# Google Cloud Build - CI/CD Pipeline
steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/argos:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/argos:latest'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/argos:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/argos:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'argos'
      - '--image'
      - 'gcr.io/$PROJECT_ID/argos:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '4Gi'
      - '--cpu'
      - '2'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '5'
      - '--set-env-vars'
      - 'ARGOS_ENV=cloud,ARGOS_MCP_HOST=0.0.0.0,ARGOS_MCP_PORT=8080'

images:
  - 'gcr.io/$PROJECT_ID/argos:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/argos:latest'
