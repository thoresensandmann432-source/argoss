runtime: python311
env: standard
entrypoint: uvicorn cloud_entry:app --host 0.0.0.0 --port $PORT

env_variables:
  PYTHONUNBUFFERED: "1"
  ARGOS_ENV: "cloud"
  
handlers:
- url: /.*
  script: auto
  secure: always
  redirect_http_response_code: 301

automatic_scaling:
  min_instances: 1
  max_instances: 5
  target_cpu_utilization: 0.7

resources:
  memory_gb: 4
  cpu: 2
