# Публикует argos-universalsigtrip на TestPyPI через OIDC Trusted Publishing.
# PYPI_TOKEN не нужен — аутентификация через GitHub OIDC.
#
# Однократная настройка на test.pypi.org:
# 1. Войди на https://test.pypi.org
# 2. Аккаунт → Publishing → Add a new publisher
# 3. Заполни:
#    - PyPI project name: argos-universalsigtrip
#    - Owner: iliyaqdrwalqu
#    - Repository: Argoss
#    - Workflow file: publish_testpypi.yml
#    - Environment name: (оставить пустым)

name: 📦 Publish to TestPyPI (OIDC)

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # обязательно для OIDC Trusted Publishing

jobs:
  publish-testpypi:
    name: Build and publish to TestPyPI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build package
        run: python -m build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
