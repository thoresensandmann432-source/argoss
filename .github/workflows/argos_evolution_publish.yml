name: 🤖 Argos Auto-Publish Skills to PyPI

# Запускается когда появляется новый навык в src/skills/
on:
  push:
    branches: [main]
    paths:
      - 'src/skills/**/*.py'
  workflow_dispatch:
    inputs:
      skill_name:
        description: 'Имя навыка для публикации (без .py)'
        required: false
        default: ''

permissions:
  contents: write
  id-token: write   # для Trusted Publishing (без токена)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── ШАГ 1: Определяем изменённые навыки ───────────────
  detect-skills:
    runs-on: ubuntu-latest
    outputs:
      skills: ${{ steps.changed.outputs.skills }}
      has_skills: ${{ steps.changed.outputs.has_skills }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Detect changed skills
        id: changed
        run: |
          if [ -n "${{ github.event.inputs.skill_name }}" ]; then
            SKILLS='["${{ github.event.inputs.skill_name }}"]'
            echo "skills=$SKILLS" >> $GITHUB_OUTPUT
            echo "has_skills=true" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'src/skills/*.py' \
              | grep -v '__init__' \
              | sed 's|src/skills/||;s|\.py$||' \
              | jq -R . | jq -sc .)
            echo "skills=$CHANGED" >> $GITHUB_OUTPUT
            COUNT=$(echo $CHANGED | jq length)
            echo "has_skills=$([ $COUNT -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "Changed skills: $CHANGED"
          fi

  # ── ШАГ 2: Обучаем собственную модель ─────────────────
  train-model:
    runs-on: ubuntu-latest
    needs: detect-skills
    if: needs.detect-skills.outputs.has_skills == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install scikit-learn numpy requests

      - name: Train Argos own model
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from src.argos_model import ArgosOwnModel
          model = ArgosOwnModel(core=None)
          result = model.train()
          print(result)
          "
        continue-on-error: true

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: argos-model
          path: data/argos_model/
          retention-days: 30

  # ── ШАГ 3: Публикуем навыки на PyPI ───────────────────
  publish-skills:
    runs-on: ubuntu-latest
    needs: [detect-skills, train-model]
    if: needs.detect-skills.outputs.has_skills == 'true'
    strategy:
      matrix:
        skill: ${{ fromJson(needs.detect-skills.outputs.skills) }}
      fail-fast: false   # публикуем все навыки, даже если один упал

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build tools
        run: pip install build twine

      - name: Install project dependencies
        run: |
          pip install -r requirements.txt || true

      - name: Build and publish ${{ matrix.skill }}
        continue-on-error: true  # non-blocking: PYPI_TOKEN may not be set
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
          PYPI_AUTHOR: ${{ vars.PYPI_AUTHOR || 'ARGOS System' }}
          PYPI_AUTHOR_EMAIL: ${{ vars.PYPI_AUTHOR_EMAIL || 'argos@sigtrip.dev' }}
          GITHUB_REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          python -c "
          import sys, os
          sys.path.insert(0, '.')
          from src.pypi_publisher import ArgosPyPIPublisher
          pub = ArgosPyPIPublisher()
          result = pub.publish('${{ matrix.skill }}')
          print(result)
          if '❌' in result:
              sys.exit(1)
          "

      - name: Comment on commit
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const skill = '${{ matrix.skill }}';
            const status = '${{ job.status }}' === 'success' ? '✅' : '⚠️';
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `${status} Навык \`${skill}\` → PyPI [argos-skill-${skill.replace(/_/g,'-')}]`
            });

  # ── ШАГ 4: Git-тег новой версии ───────────────────────
  tag-release:
    runs-on: ubuntu-latest
    needs: publish-skills
    if: success()
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create evolution tag
        run: |
          git config user.name "ARGOS Evolution"
          git config user.email "argos@sigtrip.dev"
          DATE=$(date +%Y.%m.%d.%H%M)
          TAG="evolution-${DATE}"
          git tag -a "$TAG" -m "🧬 Auto-evolution: new skills published to PyPI"
          git push origin "$TAG"
        continue-on-error: true

  # ── ШАГ 5: Коммит обученной модели обратно ────────────
  commit-model:
    runs-on: ubuntu-latest
    needs: [train-model, publish-skills]
    if: always() && needs.train-model.result == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download model artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: argos-model
          path: data/argos_model/

      - name: Commit trained model
        run: |
          git config user.name "ARGOS AutoTrain"
          git config user.email "argos@sigtrip.dev"
          git add data/argos_model/
          git diff --cached --quiet || git commit -m "🧠 chore: update trained model [skip ci]"
          git push
        continue-on-error: true
