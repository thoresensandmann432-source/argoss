name: Validate & Release Preparation
on:
  push:
    branches: [main, "release/*"]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install chardet pytest
      - name: Fix encoding issues
        run: python3 fix_encoding.py
      - name: Validate Python syntax
        run: |
          find . -name "*.py" -type f \
            ! -path "*/venv/*" ! -path "*/__pycache__/*" \
            -exec python3 -m py_compile {} +
      - name: Validate project
        run: python3 validate_project.py
      - name: Run tests
        run: pytest -q
